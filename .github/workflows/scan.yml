name: DealScout Scan

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e .
          pip install 'google-genai>=1.0' 2>/dev/null || true
          python -m playwright install chromium 2>/dev/null || true

      - name: Create .env
        run: |
          cat > .env << EOF
          DATABASE_URL=sqlite+aiosqlite:///data/dealscout.db
          LOG_LEVEL=INFO
          MIN_DISCOUNT_PERCENT=15
          GEMINI_API_KEY=\${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL=gemini-2.0-flash
           GROQ_API_KEY=\${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY=\${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL=\${{ secrets.OPENROUTER_MODEL }}
          AMAZON_ASSOCIATES_TAG=mrpa96-21
          TRADEDOUBLER_AMAZON_TAG=\${{ secrets.TRADEDOUBLER_AMAZON_TAG }}
          EBAY_PARTNER_NETWORK_ID=\${{ secrets.EBAY_PARTNER_NETWORK_ID }}
          ALIEXPRESS_TRACKING_ID=default
          TWITTER_API_KEY=\${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET=\${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN=\${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET=\${{ secrets.TWITTER_ACCESS_SECRET }}
          TELEGRAM_BOT_TOKEN=\${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID=\${{ secrets.TELEGRAM_CHANNEL_ID }}
          EOF

      - name: Run scan
        run: dealscout scan
        continue-on-error: true

      - name: Commit state
        if: always()
        run: |
          git config user.name "DealScout Bot"
          git config user.email "bot@dealscout.ai"
          git add -f data/ 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update state [skip ci]"
          git push 2>/dev/null || true
